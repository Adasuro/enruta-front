<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- SEO Básico -->
    <title>EnRuta | Transporte Urbano Inteligente</title>
    <meta name="description" content="Digitalizamos el transporte informal en Latinoamérica. Encuentra rutas, paraderos y tarifas en tiempo real mediante crowdsourcing colaborativo." />

    <link rel="manifest" href="/manifest.json" />

    <meta property="og:title" content="EnRuta | Transporte Urbano Inteligente" />
